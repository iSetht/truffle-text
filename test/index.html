<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truffle Text Playground</title>
  </head>
  <body>
    <main>
      <p>
        <label for="message">Text:</label>
        <input id="message" type="text" value="Hello from Truffle!" maxlength="240" autocomplete="off" />
      </p>

      <p>
        <label for="style">Style:</label>
        <select id="style" disabled>
          <option>Loading styles...</option>
        </select>
      </p>

      <button id="background" type="button">Switch to black background</button>
      <p id="status" role="status">Loading Truffle assets...</p>

      <div id="preview" style="background: white; overflow: auto; padding: 12px;">
        <canvas id="output"></canvas>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
